name: CI - Docker UI Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ui-tests .

      - name: Run tests in Docker and export results
        run: |
          docker run --name test-container ui-tests
          docker cp test-container:/app/allure-results ./allure-results
          docker rm test-container

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results